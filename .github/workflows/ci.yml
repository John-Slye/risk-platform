name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install project + dev deps
        run: uv sync --frozen

      - name: Lint with ruff
        run: uv run ruff check src tests

      - name: Run pytest
        run: uv run pytest -q
